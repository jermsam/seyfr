name: Build and Release Windows Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build & Package Windows (MSIX & Standalone EXE)
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Set up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            core -> target

      - name: Install uniffi-bindgen-cs
        shell: pwsh
        run: |
          cargo install uniffi-bindgen-cs --git https://github.com/NordSecurity/uniffi-bindgen-cs --tag v0.10.0+v0.29.4 --locked

      - name: Build Rust Core DLL
        shell: pwsh
        run: |
          cargo build --release --target x86_64-pc-windows-msvc --manifest-path core/Cargo.toml

      - name: Generate C# UniFFI Bindings
        shell: pwsh
        run: |
          uniffi-bindgen-cs --library target/x86_64-pc-windows-msvc/release/seyfr_core.dll --config core/uniffi.toml --out-dir platforms/windows/Generated

      - name: Copy Rust DLL to Windows project
        shell: pwsh
        run: |
          Copy-Item -Path target/x86_64-pc-windows-msvc/release/seyfr_core.dll -Destination platforms/windows/seyfr_core.dll -Force

      - name: Build Standalone Unpackaged EXE
        shell: pwsh
        run: |
          dotnet publish platforms/windows/seyfr.csproj -c Release -r win-x64 -p:PublishSingleFile=true -p:SelfContained=true -p:PublishReadyToRun=true -p:Platform=x64 -p:WindowsPackageType=None -p:WindowsAppSDKSelfContained=true -o target/publish

      - name: Rename Standalone EXE for release
        shell: pwsh
        run: |
          Copy-Item -Path target/publish/seyfr.exe -Destination target/publish/seyfr-x64.exe -Force

      - name: Build and Package Packaged MSIX (For Microsoft Store)
        shell: pwsh
        run: |
          msbuild platforms/windows/seyfr.csproj /p:Configuration=Release /p:Platform=x64 /p:GenerateAppxPackageOnBuild=true /p:AppxPackageSigningEnabled=false

      - name: Locate and Rename MSIX package for release
        shell: pwsh
        run: |
          # Find the generated MSIX package in the AppPackages directory
          $msixFile = Get-ChildItem -Path platforms/windows/AppPackages -Filter *.msix -Recurse -File | Select-Object -First 1
          if ($msixFile) {
              Write-Host "Found MSIX package at: $($msixFile.FullName)"
              Copy-Item -Path $msixFile.FullName -Destination target/publish/seyfr-x64.msix -Force
              Write-Host "Copied to target/publish/seyfr-x64.msix"
          } else {
              Write-Error "Could not find generated MSIX package!"
              exit 1
          }

      - name: Create Release and Upload Binaries to Public Releases Repo
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          repository: Jitpomi/seyfr-releases
          files: |
            target/publish/seyfr-x64.exe
            target/publish/seyfr-x64.msix
          draft: false
          prerelease: false
          token: ${{ secrets.SEYFR_RELEASES_TOKEN || secrets.GITHUB_TOKEN }}
