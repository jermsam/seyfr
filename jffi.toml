[package]
name = "seyfr"
version = "0.1.0"

[platforms]
enabled = [
    "ios",
    "android",
    "macos",
    "windows",
    "linux",
]

[platforms.ios]
deployment_target = "16.0"
bundle_id = "com.example.seyfr"

[platforms.android]
min_sdk = 26
package = "com.example.seyfr"

[platforms.macos]
deployment_target = "13.0"

[platforms.windows]
min_version = "10.0.19041.0"

[platforms.linux]
gtk_version = "4.0"

[platforms.web]
target = "es2020"
